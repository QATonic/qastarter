# QAStarter CI/CD Pipeline
# Runs on push to main and all pull requests

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality checks (non-blocking — informational only)
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present
        continue-on-error: true

      - name: TypeScript type check
        run: npm run check --if-present
        continue-on-error: true

  # Unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate template manifests
        run: npm run validate:templates
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # Build + Docker + Deploy — the critical path
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # E2E tests (run in parallel with build, non-blocking for deploy)
  e2e:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            projects: 'api chromium'
          - browser: firefox
            projects: firefox
          - browser: webkit
            projects: webkit
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build application
        run: npm run build

      - name: Start server
        run: npm run start > server.log 2>&1 &
        env:
          NODE_ENV: production
          PORT: 5000
          ALLOWED_ORIGINS: http://localhost:5000

      - name: Wait for server
        run: npx wait-on http://localhost:5000/api/v1/metadata --timeout 60000

      - name: Print server logs on failure
        if: failure()
        run: cat server.log

      - name: Run E2E tests
        run: |
          for proj in ${{ matrix.projects }}; do
            args="$args --project=$proj"
          done
          npx playwright test $args
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5000

      - name: Upload E2E test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

  # Docker build (on main only)
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: qastarter:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Easypanel via Webhook
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Trigger Easypanel Deploy
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::EASYPANEL_WEBHOOK_URL secret is not configured. Skipping deploy."
            echo "To enable auto-deploy, add EASYPANEL_WEBHOOK_URL to GitHub repo secrets."
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL")
          echo "Deploy webhook returned HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi
        env:
          WEBHOOK_URL: ${{ secrets.EASYPANEL_WEBHOOK_URL }}
